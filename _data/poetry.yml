- text: |
    لا رأيَ للحقِّ الضَّعيفِ ولا صـدى
    والرَّأيُ رأيُ القـــــاهرِ الغـــــلّابِ
    لا عدلَ إلّا إن تعادلتِ القـــــوى
    وتصـادمَ الإرهــابُ بالإرهــابِ
  author: "الدّكتور الشّهىيد عَبد العَزيز الرّنتيسي تقبّلهُ اللّه"
  lang: "ar"
- text: |
    كل من قد شذّ عن دين الإله
    في شقاءٍ دائمٍ طولَ الحياة
    ينشُدُ الأمنَ على درب المتاه
    كلما سارَ بعيداً في سُراه
    عادَ مفتوناً بتأليهِ سواه
  author: ""
  lang: "ar"
- text: |
    إن الحبيب المصطفى
    ذو رأفـــةٍ وذو وفــــــا
    وذكـــرُهُ فيه الشفــــا
    إذا تمادتِ العــــــلل
  author: ""
  lang: "ar"
- text: |
    فلا تهنـــــــــــــوا
    فلا حزن ولا شجن 
    بظل مدبر الأمـــر
  author: ""
  lang: "ar"